<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>戮判城工作系统 - 序章</title>
  <style>
    @font-face {
      font-family: 'HuiwenMincho';
      src: url('assets/fonts/Huiwen-mincho.otf') format('opentype'),
           url('assets/fonts/Huiwen-mincho.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'YuanguSongti';
      src: url('assets/fonts/YuanguSongti-Regular.otf') format('opentype'),
           url('assets/fonts/YuanguSongti-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'YuanguSongti', "Songti SC", serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      color: #fff;
      overflow: hidden;
    }

    /* 在背景上叠加轻微噪点纹理 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image:
        radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.3) 0, transparent 3px),
        radial-gradient(circle at 20px 30px, rgba(255, 255, 255, 0.25) 0, transparent 3px),
        radial-gradient(circle at 40px 10px, rgba(255, 255, 255, 0.2) 0, transparent 3px),
        radial-gradient(circle at 10px 40px, rgba(255, 255, 255, 0.2) 0, transparent 3px);
      background-size: 80px 80px;
      mix-blend-mode: screen;
    }

    body.show-login {
      /* 使用项目目录下 assets 文件夹中的 Login-bg.png 作为背景，完整显示图片 */
      background: #000 url("assets/Login-bg.png") no-repeat center center;
      background-size: contain;
    }

    .login-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(540px, 92vw);
      height: min(640px, 84vh);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    body.show-login .login-wrapper {
      display: flex;
    }

    .glass-card {
      position: relative;
      width: min(360px, 100%);
      padding: 44px 36px 36px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(28px) saturate(1.2);
      -webkit-backdrop-filter: blur(28px) saturate(1.2);
      transition: transform 0.7s cubic-bezier(0.25, 0.8, 0.25, 1);
      transform: translateY(0);
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(
        circle at top left,
        rgba(255, 255, 255, 0.18),
        transparent 55%
      );
      opacity: 0.35;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .title {
      position: relative;
      font-family: 'HuiwenMincho', "Songti SC", serif;
      font-size: 30px;
      letter-spacing: 0.2em;
      text-align: center;
      margin-bottom: 36px;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.96);
    }

    .form-group {
      position: relative;
      margin-bottom: 22px;
    }

    .label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.08em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(0, 0, 0, 0.25);
      color: #fff;
      outline: none;
      font-size: 14px;
      letter-spacing: 0.05em;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: rgba(255, 255, 255, 0.55);
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
    }

    input[readonly] {
      opacity: 0.85;
    }

    .error {
      font-size: 12px;
      margin-top: 8px;
      color: #ff9999;
      min-height: 16px;
      letter-spacing: 0.03em;
    }

    .btn-submit {
      margin-top: 18px;
      width: 100%;
      padding: 12px 0;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #1a1a1a;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      opacity: 0.95;
    }

    .btn-submit:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    /* ===== 序章（开场剧情 + 手机 UI） ===== */
    .prologue {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      background: #000;
    }

    .prologue.hidden {
      display: none;
    }

    .prologue-frame {
      width: min(980px, 92vw);
      min-height: min(560px, 84vh);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .prologue-stage {
      position: absolute;
      inset: 0;
      padding: 28px 26px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
    }

    .story-text {
      align-self: center;
      justify-self: center;
      width: min(720px, 88vw);
      text-align: left;
      line-height: 1.9;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.06em;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.12);
      user-select: none;
      white-space: pre-wrap;
      font-family: 'HuiwenMincho', "Songti SC", serif;
    }

    .story-hint {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      letter-spacing: 0.12em;
      user-select: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn-continue {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.92);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .btn-continue:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(125, 243, 255, 0.55);
    }

    .btn-continue:active {
      transform: translateY(1px);
    }

    /* 手机 UI */
    .phone-wrap {
      position: absolute;
      inset: 0;
      display: none;
      padding: 24px;
    }

    .phone-wrap.active {
      display: grid;
      place-items: center;
    }

    .phone {
      width: min(380px, 92vw);
      height: min(720px, 84vh);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.5));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.85);
      position: relative;
      overflow: hidden;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 10%, rgba(125, 243, 255, 0.12), transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(255, 139, 246, 0.1), transparent 55%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .phone-topbar {
      position: relative;
      z-index: 2;
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      letter-spacing: 0.18em;
      user-select: none;
    }

    .phone-screen {
      position: relative;
      z-index: 2;
      height: calc(100% - 44px);
      padding: 14px 14px 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .phone-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.32);
    }

    .phone-title {
      font-size: 14px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.9);
      user-select: none;
    }

    .notify-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .notify-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(125, 243, 255, 0.5);
      background: rgba(255, 255, 255, 0.07);
    }

    .notify-btn:active {
      transform: translateY(1px);
    }

    .ghost-icon {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(125, 243, 255, 0.12);
      border: 1px solid rgba(125, 243, 255, 0.35);
      color: rgba(255, 255, 255, 0.92);
      font-weight: 700;
      letter-spacing: 0;
      font-size: 12px;
    }

    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ff5a7a;
      color: #101018;
      font-size: 11px;
      font-weight: 700;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .panel {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .list {
      padding: 10px 10px 12px;
      display: grid;
      gap: 10px;
    }

    .contact {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .contact:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(125, 243, 255, 0.12);
      border: 1px solid rgba(125, 243, 255, 0.3);
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 800;
      letter-spacing: 0.06em;
      user-select: none;
    }

    .contact-name {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.1em;
    }

    .contact-sub {
      margin-top: 4px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.62);
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ff5a7a;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .chat {
      height: 100%;
      display: none;
      grid-template-rows: auto 1fr auto;
    }

    .chat.active {
      display: grid;
    }

    .chat-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.35);
    }

    .back {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.86);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    .chat-name {
      font-size: 14px;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.92);
      user-select: none;
    }

    .chat-body {
      padding: 12px 10px;
      overflow: auto;
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.36));
    }

    .bubble {
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      letter-spacing: 0.06em;
      line-height: 1.7;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .bubble.me {
      justify-self: end;
      background: rgba(125, 243, 255, 0.11);
      border-color: rgba(125, 243, 255, 0.25);
    }

    .bubble.them {
      justify-self: start;
      background: rgba(255, 255, 255, 0.05);
    }

    .bubble.aside {
      justify-self: center;
      max-width: 100%;
      text-align: left;
      background: rgba(0, 0, 0, 0.32);
      border-color: rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.86);
    }

    .chat-actions {
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .mini-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.9);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .mini-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .mini-btn:active {
      transform: translateY(1px);
    }

    /* 引导箭头 */
    .guide {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      display: none;
    }

    .guide.active {
      display: block;
    }

    .guide-bubble {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 22px;
      width: min(520px, 92vw);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.5);
      padding: 12px 14px;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.08em;
      line-height: 1.7;
      font-size: 13px;
      font-family: 'HuiwenMincho', "Songti SC", serif;
    }

    .arrow {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 92px;
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 22px solid rgba(125, 243, 255, 0.75);
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.7));
      animation: bob 0.9s ease-in-out infinite alternate;
    }

    @keyframes bob {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(-10px); }
    }

    /* 一屋子鬼（用 CSS 造一个朦胧群像） */
    .ghost-room {
      position: absolute;
      inset: 0;
      display: none;
      background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.08), transparent 55%),
        radial-gradient(circle at 20% 70%, rgba(125, 243, 255, 0.12), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(255, 139, 246, 0.1), transparent 62%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.92));
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .ghost-room.active {
      display: block;
      opacity: 1;
    }

    .ghost-crowd {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      width: min(860px, 96vw);
      height: min(320px, 42vh);
      opacity: 0.9;
      filter: blur(0.2px);
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      padding: 12px 18px;
    }

    .ghost {
      align-self: end;
      width: 100%;
      height: 100%;
      max-height: 240px;
      border-radius: 999px 999px 18px 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .ghost::before {
      content: "";
      position: absolute;
      inset: -20% -10% 0 -10%;
      background: radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.12), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .ghost:nth-child(3n) { background: rgba(125, 243, 255, 0.06); }
    .ghost:nth-child(4n) { background: rgba(255, 139, 246, 0.05); }
    .ghost:nth-child(2n) { transform: translateY(12px); }
    .ghost:nth-child(5n) { transform: translateY(-6px); opacity: 0.75; }

    .overlay-text {
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      width: min(820px, 92vw);
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.45);
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.08em;
      line-height: 1.85;
      font-size: 14px;
      white-space: pre-wrap;
      text-shadow: 0 0 18px rgba(0, 0, 0, 0.6);
      user-select: none;
      font-family: 'HuiwenMincho', "Songti SC", serif;
    }

  </style>
</head>
<body>
  <!-- 序章：在“戮判城工作系统”出现之前播放 -->
  <div id="prologue" class="prologue" aria-label="序章">
    <div class="prologue-frame">
      <div class="prologue-stage" id="storyStage">
        <div class="story-text" id="storyText">【黑屏】</div>
        <div class="story-hint">
          <div class="pill">提示：按 <strong style="letter-spacing:0.08em">Enter</strong> 或点右侧按钮继续</div>
          <button class="btn-continue" id="btnContinue" type="button">继 续</button>
        </div>
      </div>

      <div class="phone-wrap" id="phoneStage" aria-label="手机界面">
        <div class="phone">
          <div class="phone-topbar">
            <div>戮判堂 · 内网</div>
            <div>电量 ∞</div>
          </div>
          <div class="phone-screen">
            <div class="phone-header">
              <div class="phone-title" id="phoneHeaderTitle">未读消息</div>
              <div class="notify-btn" id="notifyBtn" title="鬼才信（未读）">
                <div class="ghost-icon">鬼</div>
                <div style="display:flex;flex-direction:column;gap:2px;">
                  <div style="font-size:13px;letter-spacing:0.12em;color:rgba(255,255,255,0.92);">鬼才信</div>
                  <div style="font-size:12px;color:rgba(255,255,255,0.62);letter-spacing:0.06em;">点击查看</div>
                </div>
                <div class="badge" id="badge">1</div>
              </div>
            </div>

            <!-- 消息列表 -->
            <div class="panel" id="listPanel" aria-label="消息页面">
              <div class="list">
                <div class="contact" id="cNiu" role="button" tabindex="0" aria-label="打开牛大人对话">
                  <div class="avatar">牛</div>
                  <div>
                    <div class="contact-name">牛大人</div>
                    <div class="contact-sub">王助理，下五子棋吗？</div>
                  </div>
                  <div class="unread-dot" aria-hidden="true"></div>
                </div>
                <div class="contact" id="cMa" role="button" tabindex="0" aria-label="打开马大人对话">
                  <div class="avatar" style="background:rgba(255,139,246,0.07);border-color:rgba(255,139,246,0.25);">马</div>
                  <div>
                    <div class="contact-name">马大人</div>
                    <div class="contact-sub">（暂无新消息）</div>
                  </div>
                  <div style="width:10px;height:10px;"></div>
                </div>
                <div class="contact" id="cLord" role="button" tabindex="0" aria-label="打开城主旻狱对话">
                  <div class="avatar" style="background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.18);">冥</div>
                  <div>
                    <div class="contact-name">城主 旻狱</div>
                    <div class="contact-sub">（置顶）</div>
                  </div>
                  <div style="width:10px;height:10px;"></div>
                </div>
              </div>
            </div>

            <!-- 聊天界面 -->
            <div class="panel chat" id="chatPanel" aria-label="聊天页面">
              <div class="chat-top">
                <button class="back" id="btnBack" type="button">返回</button>
                <div class="chat-name" id="chatName">牛大人</div>
                <div style="width:62px;"></div>
              </div>
              <div class="chat-body" id="chatBody"></div>
              <div class="chat-actions">
                <button class="mini-btn" id="btnSendToMa" type="button">点进马大人头像发消息</button>
                <button class="mini-btn" id="btnMinimize" type="button">缩小化手机</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 引导层 -->
      <div class="guide" id="guide">
        <div class="arrow" aria-hidden="true"></div>
        <div class="guide-bubble" id="guideText">点击「鬼才信」图标，查看未读消息。</div>
      </div>

      <!-- 缩小手机后：一屋子鬼 + 叙述 -->
      <div class="ghost-room" id="ghostRoom" aria-label="戮判堂内景">
        <div class="overlay-text" id="roomText"></div>
        <div class="ghost-crowd" aria-hidden="true">
          <div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div>
          <div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div>
          <div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div>
          <div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="login-wrapper">
    <div class="glass-card">
      <div class="title">戮判城工作系统</div>

      <form id="loginForm">
        <div class="form-group">
          <label class="label" for="account">账号</label>
          <!-- 固定账号，用户不可修改 -->
          <input
            id="account"
            type="text"
            value="19880803"
            readonly
          />
        </div>

        <div class="form-group">
          <label class="label" for="password">密码</label>
          <input
            id="password"
            type="password"
            autocomplete="off"
            placeholder="请输入密码"
          />
          <div id="error" class="error"></div>
        </div>

        <button type="submit" class="btn-submit">登 录</button>
      </form>
    </div>
  </div>

  <script>
    // ===== 序章脚本 =====
    const prologueEl = document.getElementById("prologue");
    const storyStage = document.getElementById("storyStage");
    const storyText = document.getElementById("storyText");
    const btnContinue = document.getElementById("btnContinue");

    const phoneStage = document.getElementById("phoneStage");
    const notifyBtn = document.getElementById("notifyBtn");
    const badge = document.getElementById("badge");
    const phoneHeaderTitle = document.getElementById("phoneHeaderTitle");

    const listPanel = document.getElementById("listPanel");
    const chatPanel = document.getElementById("chatPanel");
    const chatName = document.getElementById("chatName");
    const chatBody = document.getElementById("chatBody");
    const btnBack = document.getElementById("btnBack");
    const btnSendToMa = document.getElementById("btnSendToMa");
    const btnMinimize = document.getElementById("btnMinimize");

    const cNiu = document.getElementById("cNiu");
    const cMa = document.getElementById("cMa");
    const cLord = document.getElementById("cLord");

    const guide = document.getElementById("guide");
    const guideText = document.getElementById("guideText");

    const ghostRoom = document.getElementById("ghostRoom");
    const roomText = document.getElementById("roomText");

    const storyPages = [
      "【黑屏】\n\n戮判城，地府中专司杀业裁决之地。\n一切犯下杀业的亡魂，皆要在此接受审判。\n古往今来，上至帝王将相，下至牲畜蝼蚁，无任何生灵可免。",
      "【鬼才信图标，显示未读消息】\n（你的手机在掌心轻轻一震。）",
      "【点击图标】",
    ];

    let storyIdx = 0;
    let activeChat = "list"; // list | niu | ma | lord | room
    let canAdvanceStory = true;

    function setStoryText(text) {
      storyText.textContent = text;
    }

    function showPhoneUI() {
      storyStage.style.display = "none";
      phoneStage.classList.add("active");
      guide.classList.add("active");
      guideText.textContent = "点击「鬼才信」图标，查看未读消息。";
    }

    function showList() {
      activeChat = "list";
      phoneHeaderTitle.textContent = "消息";
      listPanel.style.display = "block";
      chatPanel.classList.remove("active");
      guide.classList.remove("active");
    }

    function openChat(which) {
      activeChat = which;
      listPanel.style.display = "none";
      chatPanel.classList.add("active");

      chatBody.innerHTML = "";
      if (which === "niu") {
        chatName.textContent = "牛大人";
        addBubble("them", "王助理，下五子棋吗？");
        addBubble("me", "牛大人，城主去罗酆山总部述职，可未曾说给你我放假啊。");
        addBubble("them", "怕什么，有几个掌案吏还趁机还阳找自己的老情人了。我们就下一盘惊险刺激的五子棋，哪里过分了？");
        addBubble("me", "那好");
        addBubble("them", "你跟老马说一声");
        btnSendToMa.style.display = "inline-flex";
      } else if (which === "ma") {
        chatName.textContent = "马大人";
        addBubble("me", "今日未时，老牛家院子，五子棋");
        addBubble("aside", "【发完消息以后立刻变成“城主 旻狱”】【不用显示时间，地府的时间并不重要】");
        addBubble("them", "吾往罗酆山述职，可未曾说给尔等放假");
        addBubble("me", "大人赎罪！我只是为牛头马面传递消息，不小心发错了！我也劝导了他二人，奈何他们不听啊！");
        addBubble("them", "王微。");
        addBubble("them", "吾有事找你办。若办得好，你便是戮判城正式官吏。");
        addBubble("them", "现在，速速前去戮判堂。");
        addBubble("aside", "【自白：戮判堂？我不就在戮判堂嘛，我还坐在你的宝座上玩手机呢。】");
        btnSendToMa.style.display = "none";
      } else if (which === "lord") {
        chatName.textContent = "城主 旻狱";
        addBubble("aside", "（你还不敢直视置顶头像。）");
        btnSendToMa.style.display = "none";
      }

      // 滚到底部
      setTimeout(() => {
        chatBody.scrollTop = chatBody.scrollHeight;
      }, 0);
    }

    function addBubble(side, text) {
      const div = document.createElement("div");
      div.className = `bubble ${side}`;
      div.textContent = text;
      chatBody.appendChild(div);
    }

    function showRoom() {
      activeChat = "room";
      phoneStage.classList.remove("active");
      guide.classList.add("active");
      guideText.textContent = "点击空白处继续。";
      ghostRoom.classList.add("active");
      roomText.textContent =
        "【箭头引导玩家缩小化手机】\n【出现一屋子鬼】\n\n城主：今岁考绩，必不可逊于邻部情债司。汝当速结此案，以作岁首献功，庶几上峰垂青，振我衙署声威。";
    }

    function finishPrologue() {
      prologueEl.classList.add("hidden");
      document.body.classList.add("show-login");
      document.title = "戮判城工作系统 - 登录";
    }

    function advanceStory() {
      if (!canAdvanceStory) return;
      if (storyIdx < storyPages.length - 1) {
        storyIdx += 1;
        setStoryText(storyPages[storyIdx]);

        // 到“图标未读消息”时转入手机 UI
        if (storyIdx === 1) {
          canAdvanceStory = false;
          setTimeout(() => {
            showPhoneUI();
          }, 260);
        }
        return;
      }
    }

    btnContinue.addEventListener("click", advanceStory);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        // 序章还在故事页时允许 Enter 继续
        if (!prologueEl.classList.contains("hidden") && storyStage.style.display !== "none") {
          advanceStory();
        }
      }
      if (e.key === "Escape") {
        // 允许按 Esc 跳过序章直接进入登录（方便测试）
        if (!prologueEl.classList.contains("hidden")) {
          finishPrologue();
        }
      }
    });

    // 手机：点击未读消息图标进入消息列表
    notifyBtn.addEventListener("click", () => {
      badge.style.display = "none";
      guide.classList.remove("active");
      showList();
      // 默认聚焦到牛大人（剧情要求）
      setTimeout(() => {
        openChat("niu");
      }, 220);
    });

    btnBack.addEventListener("click", () => {
      showList();
    });

    cNiu.addEventListener("click", () => openChat("niu"));
    cMa.addEventListener("click", () => openChat("ma"));
    cLord.addEventListener("click", () => openChat("lord"));

    // 剧情指引：在牛大人聊天里，点按钮“去马大人发消息”
    btnSendToMa.addEventListener("click", () => {
      // 模拟“玩家退出界面→点进马大人头像”
      openChat("ma");
    });

    // 缩小手机：进入戮判堂（屋子里一群鬼）
    btnMinimize.addEventListener("click", () => {
      guide.classList.add("active");
      guideText.textContent = "箭头引导：缩小化手机。";
      showRoom();
    });

    // 房间：点击继续进入登录页（工作系统出现）
    ghostRoom.addEventListener("click", () => {
      if (activeChat === "room") {
        finishPrologue();
      }
    });

    // 初始渲染
    setStoryText(storyPages[0]);

    const form = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const pwd = passwordInput.value.trim();

      if (!pwd) {
        errorEl.textContent = "请输入密码。";
        return;
      }

      if (pwd === "91031010") {
        errorEl.textContent = "";
        location.href = "dangan.html";
      } else {
        errorEl.textContent = "密码错误，请重试。";
      }
    });

    // 登录卡热区交互：离开热区上移，回到热区复位
    const loginWrapper = document.querySelector(".login-wrapper");
    const glassCard = document.querySelector(".glass-card");

    if (loginWrapper && glassCard) {
      loginWrapper.addEventListener("mouseenter", () => {
        glassCard.style.transform = "translateY(0)";
      });
      loginWrapper.addEventListener("mouseleave", () => {
        glassCard.style.transform = "translateY(-70vh)";
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>戮判城工作系统 - 业镜台</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "SimSun", "宋体", serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      color: #fff;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image:
        radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.3) 0, transparent 3px),
        radial-gradient(circle at 20px 30px, rgba(255, 255, 255, 0.25) 0, transparent 3px),
        radial-gradient(circle at 40px 10px, rgba(255, 255, 255, 0.2) 0, transparent 3px),
        radial-gradient(circle at 10px 40px, rgba(255, 255, 255, 0.2) 0, transparent 3px);
      background-size: 80px 80px;
      mix-blend-mode: screen;
    }

    .workspace {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      margin: 0;
      border-radius: 0;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: none;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .ws-tabs {
      display: flex;
      height: 64px;
      min-height: 64px;
      max-height: 64px;
      padding: 0;
      margin: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.25);
      box-sizing: border-box;
      overflow: hidden;
      flex-shrink: 0;
    }

    .ws-tab {
      flex: 1;
      height: 64px;
      min-height: 64px;
      max-height: 64px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-radius: 0;
      border: none;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      letter-spacing: 0.18em;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: flex 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.35s ease, padding 0.3s ease;
    }

    .ws-tab:last-child { border-right: none; }

    .ws-tab[data-active="true"] {
      background: rgba(125, 243, 255, 0.08);
    }

    .ws-tab[data-active="true"] .ws-tab-title {
      color: rgba(125, 243, 255, 0.95);
      text-shadow: 0 0 8px rgba(125, 243, 255, 0.25);
    }

    @font-face {
      font-family: 'HuiwenMincho';
      src: url('assets/fonts/Huiwen-mincho.otf') format('opentype'),
           url('assets/fonts/Huiwen-mincho.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    .ws-tab-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 2;
      font-family: 'HuiwenMincho', "SimSun", "宋体", serif;
      transition: left 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .ws-tab-desc {
      position: absolute;
      left: 140px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.06em;
      line-height: 1.5;
      opacity: 0;
      max-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      pointer-events: none;
      transition: opacity 0.35s ease 0.08s, max-width 0.5s ease;
    }

    /* 有任意 tab 被悬停时，非悬停 tab 收缩消失 */
    .ws-tabs:has(.ws-tab:hover) .ws-tab:not(:hover) {
      flex: 0;
      opacity: 0;
      padding-left: 0;
      padding-right: 0;
    }

    .ws-tab:hover .ws-tab-title {
      left: 20px;
      transform: translateX(0);
    }

    .ws-tab:hover .ws-tab-desc {
      opacity: 1;
      max-width: calc(100% - 160px);
    }

    .ws-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
    }

    .ws-chat {
      flex: 0 0 260px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
    }

    .ws-main {
      flex: 1 1 0;
      min-width: 0;
      padding: 14px;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .ws-side {
      flex: 0 0 110px;
      min-width: 0;
      padding: 10px;
      overflow: auto;
      background: rgba(0, 0, 0, 0.18);
    }

    .ws-side-title {
      font-size: 13px;
      letter-spacing: 0.14em;
      margin-bottom: 10px;
      color: rgba(255, 255, 255, 0.85);
    }

    /* 场景 */
    .scene-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
      width: 100%;
    }

    .scene-wrapper .scene-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-wrapper .scene-container img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      object-fit: contain;
    }

    .hotspot {
      position: absolute;
      cursor: default;
      background: rgba(125, 243, 255, 0.05);
      border: 1px dashed rgba(125, 243, 255, 0.25);
      z-index: 2;
    }

    #hotspotContainer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #hotspotContainer .hotspot {
      pointer-events: auto;
    }

    .back-arrow {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 5;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.1em;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
    }

    .back-arrow:hover {
      background: rgba(0, 0, 0, 0.75);
      border-color: rgba(125, 243, 255, 0.4);
    }

    .hub-switcher {
      position: absolute;
      right: 14px;
      top: 14px;
      z-index: 5;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.1em;
      font-family: inherit;
      display: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .hub-switcher:hover {
      background: rgba(0, 0, 0, 0.75);
      border-color: rgba(125, 243, 255, 0.4);
    }

    /* ===== SCENE SWITCH ARROWS ===== */
    .scene-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #BD3340;
      color: #7fffd4;
      font-size: 28px;
      line-height: 56px;
      text-align: center;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .scene-arrow:hover {
      transform: translateY(-50%) scale(1.08);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
      background: #d13a48;
    }

    .scene-arrow-left {
      left: 14px;
    }

    .scene-arrow-right {
      right: 14px;
    }

    .scene-arrow::before {
      content: '';
      width: 14px;
      height: 14px;
      border-top: 3px solid currentColor;
      border-right: 3px solid currentColor;
      transform: rotate(45deg);
      margin-left: -3px;
    }

    .scene-arrow-left::before {
      transform: rotate(-135deg);
      margin-left: 3px;
    }

    /* 物品栏 */
    .item-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .item-slot {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .item-slot.filled {
      border-color: rgba(125, 243, 255, 0.35);
      background: rgba(125, 243, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
    }

    .item-slot.selected {
      border-color: #41ae3c;
      background: rgba(65, 174, 60, 0.12);
      color: #41ae3c;
      box-shadow: 0 0 10px rgba(65, 174, 60, 0.3);
    }

    .item-slot-tip {
      position: absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: min(320px, 70vw);
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(125, 243, 255, 0.35);
      background: rgba(0, 0, 0, 0.88);
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      line-height: 1.8;
      letter-spacing: 0.06em;
      display: none;
      pointer-events: none;
      text-align: left;
    }

    .item-slot-tip::after {
      content: "";
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      border-width: 6px 0 6px 6px;
      border-style: solid;
      border-color: transparent transparent transparent rgba(125, 243, 255, 0.35);
    }

    .item-slot:hover .item-slot-tip {
      display: block;
    }

    .item-slot.empty::before {
      content: attr(data-index);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
    }

    .text-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      padding: 40px;
    }

    .text-overlay.active {
      display: flex;
    }

    .text-box {
      width: min(720px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      padding: 32px 36px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(10, 12, 22, 0.96);
      color: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      line-height: 2;
      letter-spacing: 0.06em;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.85);
    }

    .text-box p {
      margin-bottom: 16px;
      text-indent: 2em;
    }

    .text-box p:last-child {
      margin-bottom: 0;
    }

    /* Toast 提示 */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 200;
      padding: 10px 24px;
      border-radius: 999px;
      border: 1px solid rgba(125, 243, 255, 0.35);
      background: rgba(0, 0, 0, 0.85);
      color: rgba(125, 243, 255, 0.95);
      font-size: 14px;
      letter-spacing: 0.12em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
    }

    .toast.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 密码输入弹窗 */
    .password-popup {
      position: fixed;
      z-index: 150;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(10, 12, 22, 0.96);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.85);
    }

    .password-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }

    .password-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .password-input {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      letter-spacing: 0.08em;
    }

    .password-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(125, 243, 255, 0.35);
      background: rgba(125, 243, 255, 0.12);
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }

    .password-btn:hover {
      background: rgba(125, 243, 255, 0.22);
    }

    .password-error {
      font-size: 12px;
      color: #ff8080;
      margin-top: 6px;
      min-height: 16px;
      letter-spacing: 0.06em;
    }

    /* ===== 鬼才信聊天栏 ===== */
    .chat-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .chat-header {
      position: relative;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .chat-title {
      font-size: 13px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 700;
    }

    .chat-header-left, .chat-header-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      cursor: pointer;
    }
    .chat-header-left { left: 8px; }
    .chat-header-right { right: 8px; }

    .chat-main {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .chat-list-panel, .chat-msg-panel {
      position: absolute;
      inset: 0;
      overflow: auto;
    }

    .chat-screen[data-view="list"] .chat-list-panel { display: block; }
    .chat-screen[data-view="list"] .chat-msg-panel { display: none; }
    .chat-screen[data-view="chat"] .chat-list-panel { display: none; }
    .chat-screen[data-view="chat"] .chat-msg-panel { display: flex; flex-direction: column; }

    .chat-contact-list {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-contact {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .chat-contact:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(125, 243, 255, 0.12);
      border: 1px solid rgba(125, 243, 255, 0.3);
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 800;
      font-size: 13px;
      flex-shrink: 0;
    }

    .chat-contact-info {
      flex: 1;
      min-width: 0;
    }

    .chat-contact-name {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.08em;
    }

    .chat-contact-sub {
      margin-top: 2px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-unread-badge {
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      background: #ff3b30;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .chat-msg-panel {
      display: flex;
      flex-direction: column;
    }

    .chat-msg-body {
      flex: 1;
      padding: 8px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-msg.them { align-items: flex-start; }
    .chat-msg.me { align-items: flex-end; }

    .chat-bubble {
      max-width: 85%;
      width: fit-content;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.6;
      letter-spacing: 0.03em;
      word-break: break-word;
    }

    .chat-bubble.them {
      background: rgba(255, 255, 255, 0.9);
      color: #111;
    }

    .chat-bubble.me {
      background: #95EC69;
      color: #111;
    }

    .chat-bubble.aside {
      align-self: center;
      max-width: 100%;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.75);
      font-size: 11px;
    }

    .chat-ts {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
    }

    .chat-actions {
      flex-shrink: 0;
      padding: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.25);
    }

    .chat-composer {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .chat-composer-input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.25);
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }

    .chat-send-btn {
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(125, 243, 255, 0.35);
      background: rgba(125, 243, 255, 0.12);
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.08em;
    }

    .chat-send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    /* ===== CUSTOM SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #000;
    }
    ::-webkit-scrollbar-thumb {
      background: #7fffd4;
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #7fffd4;
    }
    ::-webkit-scrollbar-button {
      background: #7fffd4;
    }
    ::-webkit-scrollbar-corner {
      background: #000;
    }
  </style>
</head>
<body>
  <div class="workspace" aria-label="戮判城工作台">
    <div class="ws-tabs">
      <a class="ws-tab" href="dangan.html">
        <span class="ws-tab-title">【档案台】</span>
        <span class="ws-tab-desc">这里是死者的死法。但我并不知道他们是谁，也许应该到业镜台找到他们的死亡时的证物。</span>
      </a>
      <a class="ws-tab" href="yejing.html" data-active="true">
        <span class="ws-tab-title">【业镜台】</span>
        <span class="ws-tab-desc">这里会有死者死亡时，身上最可疑的物品。每件物品都有死者的供词。可以根据供词找到物品的主人，记录在档案中。</span>
      </a>
      <a class="ws-tab" href="lunhui.html">
        <span class="ws-tab-title">【轮回轨】</span>
        <span class="ws-tab-desc">裁决最终进行的地方。我需要将什么东西按顺序输入，才能启动轮回轨，让亡魂投生六道。</span>
      </a>
    </div>
    <div class="ws-body">
      <aside class="ws-chat" id="chatSidebar" aria-label="鬼才信">
        <div class="chat-screen" id="chatScreen" data-view="list">
          <div class="chat-header">
            <div class="chat-header-left" id="chatHeaderLeft">★</div>
            <div class="chat-title" id="chatHeaderTitle">鬼才信</div>
            <div class="chat-header-right" id="chatHeaderRight">＋</div>
          </div>
          <div class="chat-main">
            <div class="chat-list-panel" id="chatListPanel">
              <div class="chat-contact-list" id="chatContactList">
                <div class="chat-contact" data-key="niu" id="cNiu">
                  <div class="chat-avatar">牛</div>
                  <div class="chat-contact-info">
                    <div class="chat-contact-name">牛大人</div>
                    <div class="chat-contact-sub">王助理，下五子棋吗？</div>
                  </div>
                  <div class="chat-unread-badge" id="niuUnread" style="display:none;"></div>
                </div>
                <div class="chat-contact" data-key="ma" id="cMa">

    function getState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
      return { inventory: [], inventoryMeta: {}, evidence: {}, locked: {}, unlocked: {}, visitedScenes: {}, chatState: null };
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderTooltipHTML(itemKey) {
      const data = ITEM_DATA[itemKey];
      if (!data) return '';
      const state = getState();
      let allParagraphs = data.paragraphs || [];
      let allHighlights = data.highlights || [];
      if (data.unlockData && state.unlocked && state.unlocked[itemKey]) {
        allParagraphs = allParagraphs.concat(data.unlockData.paragraphs);
        allHighlights = allHighlights.concat(data.unlockData.highlights || []);
      }
      return allParagraphs.map((p, i) => {
        let prefix = i === 0 ? '【' : '';
        let suffix = i === allParagraphs.length - 1 ? '】' : '';
        let text = prefix + '「' + p + '」' + suffix;
        return '<p>' + applyHighlights(text, allHighlights) + '</p>';
      }).join('');
    }

    function renderSlotTooltipHTML(itemKey) {
      const data = ITEM_DATA[itemKey];
      if (!data) return '';
      const state = getState();
      let allParagraphs = data.paragraphs || [];
      let allHighlights = data.highlights || [];
      if (data.unlockData && state.unlocked && state.unlocked[itemKey]) {
        allParagraphs = allParagraphs.concat(data.unlockData.paragraphs);
        allHighlights = allHighlights.concat(data.unlockData.highlights || []);
      }
      return allParagraphs.map((p) => {
        return '<p>' + applyHighlights(p, allHighlights) + '</p>';
      }).join('');
    }

    function applyHighlights(text, highlights) {
      if (!highlights || highlights.length === 0) return text;
      let result = text;
      highlights.forEach(h => {
        result = result.split(h).join('<strong style="color:rgba(125,243,255,0.95)">' + h + '</strong>');
      });
      return result;
    }

    function chatTs() {
      const mm = String(Math.floor(chatNetSeconds / 60)).padStart(2, '0');
      const ss = String(chatNetSeconds % 60).padStart(2, '0');
      return mm + ':' + ss;
    }

    function syncChatState() {
      const state = getState();
      state.chatState = {
        niu: { messages: chatState.niu.messages, unread: chatState.niu.unread },
        ma: { messages: chatState.ma.messages, unread: chatState.ma.unread },
        group: { messages: chatState.group.messages, unread: chatState.group.unread, visible: cGroup.style.display !== 'none' }
      };
      saveState(state);
    }

    function loadChatState() {
      const state = getState();
      if (state.chatState) {
        if (state.chatState.niu) {
          chatState.niu.messages = state.chatState.niu.messages || chatState.niu.messages;
          chatState.niu.unread = state.chatState.niu.unread || 0;
        }
        if (state.chatState.ma) {
          chatState.ma.messages = state.chatState.ma.messages || chatState.ma.messages;
          chatState.ma.unread = state.chatState.ma.unread || 0;
        }
        if (state.chatState.group) {
          chatState.group.messages = state.chatState.group.messages || [];
          chatState.group.unread = state.chatState.group.unread || 0;
          if (state.chatState.group.visible) {
            cGroup.style.display = 'flex';
          }
        }
      }
    }

    function resetChatClock() {
      if (chatNetTimer) clearInterval(chatNetTimer);
      chatNetSeconds = 0;
      chatNetTimer = setInterval(() => { chatNetSeconds++; }, 1000);
    }

    function setChatListHeader() {
      chatHeaderLeft.textContent = '★';

      chatHeaderLeft.innerHTML = '<span style="font-size:16px;">↩</span>';
      chatHeaderRight.textContent = '···';

    }

    function markChatRead(threadKey) {
      chatState[threadKey].unread = 0;
      refreshChatUnreadUI(threadKey);
      syncChatState();
    }

    function bumpChatUnread(threadKey) {
      if (chatScreen.dataset.view === 'chat' && currentChatKey === threadKey) return;
      chatState[threadKey].unread += 1;
      refreshChatUnreadUI(threadKey);
    }

    function refreshChatUnreadUI(threadKey) {
      if (threadKey === 'niu') {
        niuUnread.style.display = chatState.niu.unread > 0 ? 'grid' : 'none';
        niuUnread.textContent = String(Math.min(99, chatState.niu.unread));
      }
      if (threadKey === 'ma') {
        let badge = maUnreadSlot.querySelector('.chat-unread-badge');
        if (chatState.ma.unread > 0) {
          if (!badge) {
            badge = document.createElement('div');
            badge.className = 'chat-unread-badge';
            maUnreadSlot.replaceChildren(badge);
          }
          badge.textContent = String(Math.min(99, chatState.ma.unread));
        } else {
          maUnreadSlot.replaceChildren();
          const spacer = document.createElement('div');
          spacer.style.width = '10px';
          spacer.style.height = '10px';
          maUnreadSlot.appendChild(spacer);
        }
      }
      if (threadKey === 'group') {
        let badge = groupUnreadSlot.querySelector('.chat-unread-badge');
        if (chatState.group.unread > 0) {
          if (!badge) {
            badge = document.createElement('div');
            badge.className = 'chat-unread-badge';
            groupUnreadSlot.replaceChildren(badge);
          }
          badge.textContent = String(Math.min(99, chatState.group.unread));
        } else {
          groupUnreadSlot.replaceChildren();
          const spacer = document.createElement('div');
          spacer.style.width = '10px';
          spacer.style.height = '10px';
          groupUnreadSlot.appendChild(spacer);
        }
      }
    }

    function updateChatContactPreview(threadKey) {
      const node = { niu: cNiu, ma: cMa, group: cGroup }[threadKey];
      if (!node) return;
      const sub = node.querySelector('.chat-contact-sub');
      const last = chatState[threadKey].messages.at(-1);
      const plain = last ? last.text.replace(/\n/g, ' ').slice(0, 20) : '';
      if (sub) sub.textContent = plain || '（暂无新消息）';
    }

    function showChatList() {
      currentChatKey = null;
      chatScreen.dataset.view = 'list';
      setChatListHeader();
      resetChatClock();
      ['niu', 'ma', 'group'].forEach(k => updateChatContactPreview(k));
    }

    function openChat(threadKey) {
      currentChatKey = threadKey;
      chatScreen.dataset.view = 'chat';
      setChatMsgHeader(chatState[threadKey].displayName);
      markChatRead(threadKey);
      renderChat(threadKey);
    }

    function addChatMessage(threadKey, side, text, tsText) {
      chatState[threadKey].messages.push({ side, text, tsText });
      updateChatContactPreview(threadKey);
      if (!(chatScreen.dataset.view === 'chat' && currentChatKey === threadKey)) {
        bumpChatUnread(threadKey);
      }
      syncChatState();
    }

    function renderChat(threadKey) {
      chatMsgBody.innerHTML = '';
      const msgs = chatState[threadKey].messages;
      for (const m of msgs) {
        const wrap = document.createElement('div');
        wrap.className = 'chat-msg ' + m.side;
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble ' + m.side;
        if (m.side === 'aside') bubble.classList.add('aside');
        bubble.textContent = m.text;
        wrap.appendChild(bubble);
        const ts = document.createElement('div');
        ts.className = 'chat-ts';
        ts.textContent = m.tsText || '';
        wrap.appendChild(ts);
        chatMsgBody.appendChild(wrap);
      }
      chatMsgBody.scrollTop = chatMsgBody.scrollHeight;
    }

    function positionHotspot(container, img, hotspot, coords) {
      const imgRect = img.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      if (!img.naturalWidth || !img.naturalHeight) return;
      const scaleX = imgRect.width / img.naturalWidth;
      const scaleY = imgRect.height / img.naturalHeight;
      const left = imgRect.left - containerRect.left + coords.x1 * scaleX;
      const top = imgRect.top - containerRect.top + coords.y1 * scaleY;
      const width = (coords.x2 - coords.x1) * scaleX;
      const height = (coords.y2 - coords.y1) * scaleY;
      hotspot.style.left = left + 'px';
      hotspot.style.top = top + 'px';
      hotspot.style.width = width + 'px';
      hotspot.style.height = height + 'px';
    }

    function setupHotspots(sceneName) {
      hotspotContainer.innerHTML = '';
      const container = sceneWrapper.querySelector('.scene-container');
      const configs = SCENE_CONFIG[sceneName].hotspots || [];

      // linhuaner：点击任意区域进入 linhuaner2
      if (sceneName === 'linhuaner') {
        const clickHandler = () => {
          switchScene('linhuaner2');
          sceneImg.removeEventListener('click', clickHandler);
        };
        sceneImg.addEventListener('click', clickHandler);
      }

      // 进入 linhuaner2 后标记已访问，下次 scence2 显示 scence2-1.png
      if (sceneName === 'linhuaner2') {
        const state = getState();
        if (!state.visitedScenes) state.visitedScenes = {};
        if (!state.visitedScenes.linhuaner2) {
          state.visitedScenes.linhuaner2 = true;
          saveState(state);
        }
      }

      configs.forEach((cfg) => {
        if (cfg.type === 'input') {
          const el = document.createElement('div');
          el.className = 'hotspot';
          hotspotContainer.appendChild(el);
          positionHotspot(container, sceneImg, el, cfg.coords);

          el.addEventListener('click', (e) => {
            e.stopPropagation();
            showPasswordInput(e.clientX, e.clientY, cfg.hint || '', cfg.correct, () => {
              switchScene(cfg.target);
            }, cfg.placeholder);
          });
          return;
        }

        const el = document.createElement('div');
        el.className = 'hotspot';
        hotspotContainer.appendChild(el);

        const sceneConfig = SCENE_CONFIG[sceneName];
        if (sceneConfig.type === 'hub') {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            if (cfg.target === 'from_well' && selectedItem === '???') {
              const state = getState();
              const idx = state.inventory.indexOf('???');
              if (idx !== -1) {
                state.inventory[idx] = '一碗水';
                saveState(state);
                renderInventory();
                selectedItem = null;
                showDialog(ITEM_DATA['一碗水'].paragraphs, () => {
                  showToast('获得物品 +1');
                  switchScene(cfg.target);
                });
              } else {
                switchScene(cfg.target);
              }
            } else if (cfg.target === 'tv') {
              const correctCount = countCorrectEvidence();
              const state = getState();
              if (correctCount >= 25) {
                state.letterPage = 0;
                saveState(state);
                switchScene('letter5');
              } else if (correctCount >= 20) {
                state.letterPage = 0;
                saveState(state);
                switchScene('letter4');
              } else if (correctCount >= 15) {
                state.letterPage = 0;
                saveState(state);
                switchScene('letter3');
              } else if (correctCount >= 10) {
                state.letterPage = 0;
                saveState(state);
                switchScene('letter2');
              } else if (correctCount >= 5) {
                switchScene('letter1');
              } else {
                showToast('您暂无信件');
              }
            } else if (cfg.target) {
              switchScene(cfg.target);
            } else if (cfg.itemKey) {
              collectItem(cfg.itemKey);
            }
          });
        } else {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            if (sceneName === 'shentai' && cfg.target && selectedItem === '??') {
              switchScene(cfg.target);
            } else if (cfg.password) {
              showPasswordInput(e.clientX, e.clientY, '日期', cfg.password, () => {
                collectItem(cfg.itemKey);
              });
            } else if (sceneName === 'linhuaner2' && cfg.itemKey === '纸币' && !getState().jumpScared) {
              doJumpScare(() => {
                collectItem(cfg.itemKey);
              });
            } else if (sceneName === 'shentai2' && cfg.itemKey === '鸡毛') {
              collectItem(cfg.itemKey);
              const state = getState();
              const idx = state.inventory.indexOf('??');
              if (idx !== -1) {
                state.inventory.splice(idx, 1);
                saveState(state);
                renderInventory();
              }
            } else if (cfg.itemKey) {
              collectItem(cfg.itemKey);
            }
          });
        }

        positionHotspot(container, sceneImg, el, cfg.coords);

        // 选中诱蛇神药时，hover snake 热区显示“引诱”按钮
        if (sceneName === 'scence1' && cfg.target === 'snake') {
          el.addEventListener('mouseenter', () => {
            if (selectedItem !== '诱蛇神药') return;
            if (el.querySelector('.interaction-btn')) return;

            btn.textContent = '引诱';

            el.appendChild(btn);

            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const state = getState();
              if (state.inventory.length >= itemSlots.length) {
                showToast('物品栏已满，可将物品送至档案台');
                return;
              }
              state.inventory.push('蛇胆');
              saveState(state);
              renderInventory();
              selectedItem = null;
              setupHotspots('scence1');
              showToast('获得物品 +1');
            });
          });

          el.addEventListener('mouseleave', () => {
            const btn = el.querySelector('.interaction-btn');
            if (btn) btn.remove();
          });
        }
      });
    }

    function switchScene(sceneName) {
      currentScene = sceneName;
      const config = SCENE_CONFIG[sceneName];
      sceneImg.src = getSceneImage(sceneName);

      const onLoad = () => {
        requestAnimationFrame(() => {
          setupHotspots(sceneName);
          const isHub = config.type === 'hub';
          backArrow.style.display = isHub ? 'none' : 'block';
          hubSwitcher.style.display = isHub ? 'block' : 'none';

          // scene switch arrows visibility
          if (sceneArrowLeft && sceneArrowRight) {
            const atScence1 = sceneName === 'scence1';
            const atScence2 = sceneName === 'scence2';
            sceneArrowLeft.style.display = atScence2 ? 'flex' : 'none';
            sceneArrowRight.style.display = atScence1 ? 'flex' : 'none';
          }

          // 信件翻页按钮
          const oldNav = sceneWrapper.querySelector('.letter-nav');
          if (oldNav) oldNav.remove();
          if (config.letterPages && config.letterPages.length > 1) {
            const nav = document.createElement('div');
            nav.className = 'letter-nav';
            nav.style.cssText = 'position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:5;';
            const leftBtn = document.createElement('button');
            leftBtn.textContent = '←';
            leftBtn.style.cssText = 'width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.6);color:#fff;font-size:18px;cursor:pointer;';
            const rightBtn = document.createElement('button');
            rightBtn.textContent = '→';
            rightBtn.style.cssText = 'width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.6);color:#fff;font-size:18px;cursor:pointer;';
            const state = getState();
            let page = state.letterPage || 0;
            const update = () => {
              sceneImg.src = config.letterPages[page];
              leftBtn.style.opacity = page <= 0 ? '0.3' : '1';
              leftBtn.style.pointerEvents = page <= 0 ? 'none' : 'auto';
              rightBtn.style.opacity = page >= config.letterPages.length - 1 ? '0.3' : '1';
              rightBtn.style.pointerEvents = page >= config.letterPages.length - 1 ? 'none' : 'auto';
            };
            leftBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              if (page > 0) { page--; state.letterPage = page; saveState(state); update(); }
            });
            rightBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              if (page < config.letterPages.length - 1) { page++; state.letterPage = page; saveState(state); update(); }
            });
            nav.appendChild(leftBtn);
            nav.appendChild(rightBtn);
            sceneWrapper.appendChild(nav);
            update();
          }
        });
        sceneImg.onload = null;
      };

      sceneImg.onload = onLoad;

      if (sceneImg.complete && sceneImg.naturalWidth > 0) {
        onLoad();
      }
    }

    backArrow.addEventListener('click', () => {
      const config = SCENE_CONFIG[currentScene];
      if (config.parent) {

        setTimeout(() => {

    function countCorrectEvidence() {
      const state = getState();
      let count = 0;
      if (state.evidenceLocked) {
        for (const code in state.evidenceLocked) {
          for (const slot of state.evidenceLocked[code]) {
            if (slot) count++;
          }
        }
      }
      return count;
    }

    function showDialog(paragraphs, onEnd) {
      const existing = document.getElementById('dialogBox');
      if (existing) existing.remove();

      const dialogBox = document.createElement('div');
      dialogBox.id = 'dialogBox';
      dialogBox.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:150;padding:24px 32px;background:rgba(10,12,22,0.96);border-top:1px solid rgba(255,255,255,0.2);font-size:15px;line-height:1.9;letter-spacing:0.06em;color:rgba(255,255,255,0.92);cursor:pointer;';
      dialogBox.innerHTML = '<div id="dialogText" style="min-height:1.9em;"></div><div id="dialogHint" style="margin-top:12px;font-size:12px;color:rgba(255,255,255,0.5);animation:pulse 1.2s ease-in-out infinite;">点击继续</div>';

      const style = document.createElement('style');
      style.textContent = '@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}';
      dialogBox.appendChild(style);
      document.body.appendChild(dialogBox);

      let index = 0;
      const dialogText = document.getElementById('dialogText');

      const showNext = () => {
        if (index >= paragraphs.length) {
          dialogBox.remove();
          if (onEnd) onEnd();
          return;
        }
        dialogText.textContent = paragraphs[index];
        index++;
        if (index >= paragraphs.length) {
          document.getElementById('dialogHint').textContent = '点击结束';
        }
      };

      showNext();
      dialogBox.addEventListener('click', showNext);
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('active');
      setTimeout(() => {
        toastEl.classList.remove('active');
      }, 1500);
    }

    function showPasswordInput(x, y, hint, correctPassword, onCorrect, placeholder) {
      const existing = document.querySelector('.password-popup');
      if (existing) existing.remove();

      const popup = document.createElement('div');
      popup.className = 'password-popup';
      popup.style.left = Math.min(x, window.innerWidth - 260) + 'px';
      popup.style.top = Math.min(y + 20, window.innerHeight - 160) + 'px';
      popup.innerHTML = `
        <div class="password-hint">${hint ? '提示：' + hint : ''}</div>
        <div class="password-row">
          <input type="text" class="password-input" placeholder="${placeholder || '输入密码'}" />
          <button class="password-btn">确认</button>
        </div>
        <div class="password-error"></div>
      `;
      document.body.appendChild(popup);

      const input = popup.querySelector('.password-input');
      const btn = popup.querySelector('.password-btn');
      const error = popup.querySelector('.password-error');

      const check = () => {
        if (input.value.trim() === correctPassword) {
          popup.remove();
          onCorrect();
        } else {
          error.textContent = '密码错误';
          input.value = '';
          input.focus();
        }
      };

      btn.addEventListener('click', check);
      input.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Enter') check();
        if (e.key === 'Escape') popup.remove();
      });

      input.focus();

      const outsideClick = (e) => {
        if (!popup.contains(e.target)) {
          popup.remove();
          document.removeEventListener('click', outsideClick);
        }
      };
      setTimeout(() => document.addEventListener('click', outsideClick), 0);
    }

    function collectItem(itemKey) {
      const state = getState();
      const data = ITEM_DATA[itemKey];
      if (!data) return;
      const displayName = data.displayName || itemKey;

      const alreadyHas = state.inventory.includes(displayName);

      if (!alreadyHas) {
        if (state.inventory.length >= itemSlots.length) {
          showToast('物品栏已满，可将物品送至档案台');
          return;
        }
        if (itemKey.startsWith('铁锹-')) {
          state.inventoryMeta['铁锹'] = { source: itemKey.split('-')[1] };
        }
        state.inventory.push(displayName);
        saveState(state);
        renderInventory();
        showToast('获得物品 +1');
        if (itemKey === '碎手镯') {
          cGroup.style.display = 'flex';
          triggerGroupChat();
        }
      }

      showItemText(itemKey);
    }

    function showItemText(itemKey) {
      if (itemKey === '碎手镯') {
        renderPagedText(itemKey, 0);
        return;
      }

      const data = ITEM_DATA[itemKey];
      const state = getState();
      textBox.innerHTML = renderTooltipHTML(itemKey);

      // 非翻页物品的未解锁内容处理（如将来有其他需要）
      if (data.unlockData && !(state.unlocked && state.unlocked[itemKey])) {
        const unlockDiv = document.createElement('div');
        unlockDiv.style.cssText = 'margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.15);';

          </div>
          <div class="unlock-error" style="font-size:12px;color:#ff8080;margin-top:6px;min-height:16px;"></div>
        `;
        textBox.appendChild(unlockDiv);

        const input = unlockDiv.querySelector('input');
        const btn = unlockDiv.querySelector('button');
        const error = unlockDiv.querySelector('.unlock-error');

        const check = () => {
          if (input.value.trim() === data.unlockData.password) {
            const s = getState();
            if (!s.unlocked) s.unlocked = {};
            s.unlocked[itemKey] = true;
            saveState(s);
            showItemText(itemKey);

            input.value = '';
            input.focus();
          }

        btn.addEventListener('click', check);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') check();
        });
        input.focus();

    function renderPagedText(itemKey, page) {
      const data = ITEM_DATA[itemKey];
      const state = getState();
      const isUnlocked = state.unlocked && state.unlocked[itemKey];

      let html = '<div style="display:flex;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.15);">';
      const yiActive = page === 0;
      html += '<button class="page-tab" data-page="0" style="flex:1;padding:10px 0;text-align:center;font-size:14px;letter-spacing:0.2em;border:none;background:transparent;cursor:pointer;font-family:inherit;color:' + (yiActive ? 'rgba(125,243,255,0.95)' : 'rgba(255,255,255,0.5)') + ';border-bottom:2px solid ' + (yiActive ? 'rgba(125,243,255,0.6)' : 'transparent') + ';">壹</button>';
      const erActive = page === 1;
      html += '<button class="page-tab" data-page="1" style="flex:1;padding:10px 0;text-align:center;font-size:14px;letter-spacing:0.2em;border:none;background:transparent;cursor:pointer;font-family:inherit;color:' + (erActive ? 'rgba(125,243,255,0.95)' : 'rgba(255,255,255,0.5)') + ';border-bottom:2px solid ' + (erActive ? 'rgba(125,243,255,0.6)' : 'transparent') + ';">贰</button>';
      html += '</div>';

      if (page === 0) {
        data.paragraphs.forEach((p, i) => {
          let prefix = i === 0 ? '【' : '';
          let suffix = i === data.paragraphs.length - 1 ? '】' : '';
          let text = prefix + '「' + p + '」' + suffix;
          html += '<p>' + applyHighlights(text, data.highlights) + '</p>';
        });
      } else {
        if (!isUnlocked) {
          html += '<div style="margin-top:20px;">';
          html += '<div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:12px;">此页内容已锁定，输入密码以查看</div>';
          html += '<div style="display:flex;gap:8px;">';
          html += '<input type="text" class="pw-input" placeholder="输入密码" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);color:#fff;font-size:13px;outline:none;font-family:inherit;letter-spacing:0.08em;" />';
          html += '<button class="pw-btn" style="padding:8px 14px;border-radius:8px;border:1px solid rgba(125,243,255,0.35);background:rgba(125,243,255,0.12);color:rgba(255,255,255,0.92);font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:0.08em;">确认</button>';
          html += '</div>';
          html += '<div class="pw-error" style="font-size:12px;color:#ff8080;margin-top:6px;min-height:16px;"></div>';
          html += '</div>';
        } else {
          const up = data.unlockData;
          up.paragraphs.forEach((p, i) => {
            let suffix = i === up.paragraphs.length - 1 ? '】' : '';
            let text = '「' + p + '」' + suffix;
            html += '<p>' + applyHighlights(text, up.highlights || []) + '</p>';
          });
        }
      }

      textBox.innerHTML = html;
      textOverlay.classList.add('active');

      textBox.querySelectorAll('.page-tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const targetPage = parseInt(btn.dataset.page);
          if (targetPage === 1 && !isUnlocked) {
            renderPagedText(itemKey, 1);
          } else {
            renderPagedText(itemKey, targetPage);
          }
        });
      });

      const pwBtn = textBox.querySelector('.pw-btn');
      if (pwBtn) {
        const input = textBox.querySelector('.pw-input');
        const error = textBox.querySelector('.pw-error');
        const check = () => {
          if (input.value.trim() === data.unlockData.password) {
            const s = getState();
            if (!s.unlocked) s.unlocked = {};
            s.unlocked[itemKey] = true;
            saveState(s);
            renderPagedText(itemKey, 1);
          } else {
            error.textContent = '密码错误';
            input.value = '';
            input.focus();
          }
        };
        pwBtn.addEventListener('click', check);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') check();
        });
        input.focus();
      }
    }

    function renderInventory() {
      const state = getState();
      itemSlots.forEach(slot => {
        slot.className = 'item-slot empty';
        slot.textContent = '';
        slot.removeAttribute('data-item');
        slot.removeAttribute('data-key');
        const oldTip = slot.querySelector('.item-slot-tip');
        if (oldTip) oldTip.remove();
      });

      state.inventory.forEach((name, index) => {
        if (index < itemSlots.length) {
          const slot = itemSlots[index];
          slot.classList.remove('empty');
          slot.classList.add('filled');
          if (name === selectedItem) {
            slot.classList.add('selected');
          }
          slot.textContent = name;
          slot.dataset.item = name;
          const key = Object.keys(ITEM_DATA).find(k => {
            const d = ITEM_DATA[k];
            return (d.displayName || k) === name;
          }) || name;
          slot.dataset.key = key;

          const tip = document.createElement('div');
          tip.className = 'item-slot-tip';
          let tooltipKey = key;
          if (name === '铁锹') {
            const source = state.inventoryMeta['铁锹']?.source || 'A';
            tooltipKey = '铁锹-' + source;
          }
          tip.innerHTML = renderSlotTooltipHTML(tooltipKey);
          slot.appendChild(tip);
        }
      });
    }

    renderInventory();

    document.getElementById('itemGrid').addEventListener('click', (e) => {
      const slot = e.target.closest('.item-slot');
      if (!slot) {
        selectedItem = null;
        renderInventory();
        setupHotspots(currentScene);
        return;
      }

      if (!slot.dataset.item) {
        selectedItem = null;
        renderInventory();
        setupHotspots(currentScene);
        return;
      }

      const itemName = slot.dataset.item;
      if (selectedItem === itemName) {
        let itemKey = slot.dataset.key;
        if (itemName === '铁锹') {
          const state = getState();
          const source = state.inventoryMeta['铁锹']?.source || 'A';
          itemKey = '铁锹-' + source;
        }
        selectedItem = null;
        renderInventory();
        setupHotspots(currentScene);
        showItemText(itemKey);
      } else {
        selectedItem = itemName;
        renderInventory();
        setupHotspots(currentScene);

        if (itemName === '???' || itemName === '诱蛇神药' || itemName === '??') {
          showToast('已选中「' + itemName + '」');
        }
      }
    });

    textOverlay.addEventListener('click', (e) => {
      if (e.target === textOverlay) {
        textOverlay.classList.remove('active');
      }
    });

    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) {
        renderInventory();
      }
    });

    // 初始化进入 scence1
    switchScene('scence1');

    // ===== 聊天系统初始化 =====
    loadChatState();
    refreshChatUnreadUI('niu');
    refreshChatUnreadUI('ma');
    refreshChatUnreadUI('group');
    checkFirstLoginGroup();

    cNiu.addEventListener('click', () => openChat('niu'));
    cMa.addEventListener('click', () => openChat('ma'));
    cGroup.addEventListener('click', () => openChat('group'));

    chatHeaderLeft.addEventListener('click', () => {
      if (chatScreen.dataset.view === 'chat') showChatList();
    });

    // 聊天发送按钮（仅用于群聊手动回复）
    chatSendBtn.addEventListener('click', () => {
      const val = chatInput.value.trim();
      if (!currentChatKey || !val) return;
      addChatMessage(currentChatKey, 'me', val, chatTs());
      renderChat(currentChatKey);
      chatInput.value = '';
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        chatSendBtn.click();
      }
    });

    // 跨页面同步聊天记录
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) {
        loadChatState();
        if (currentChatKey) renderChat(currentChatKey);
        refreshChatUnreadUI('niu');
        refreshChatUnreadUI('ma');
        refreshChatUnreadUI('group');
        ['niu', 'ma', 'group'].forEach(k => updateChatContactPreview(k));
      }
    });

    // ===== 开发者调试：按 ESC 一键重置 =====
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        // 如果密码弹窗打开，不拦截 Escape（让弹窗自己处理关闭）
        if (document.querySelector('.password-popup')) return;
        e.preventDefault();
        if (confirm('确定要清空本地存档并回到初始状态吗？')) {
          localStorage.removeItem(STORAGE_KEY);
          location.reload();
        }
      }
    });
  </script>
</body>
</html>

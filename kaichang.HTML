<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>戮判城工作系统 - 序章</title>
  <style>
    @font-face {
      font-family: 'HuiwenMincho';
      src: url('assets/fonts/Huiwen-mincho.otf') format('opentype'),
           url('assets/fonts/Huiwen-mincho.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'YuanguSongti';
      src: url('assets/fonts/YuanguSongti-Regular.otf') format('opentype'),
           url('assets/fonts/YuanguSongti-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'YuanguSongti', "Songti SC", serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      color: #fff;
      overflow: hidden;
    }

    /* 在背景上叠加轻微噪点纹理 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image:
        radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.3) 0, transparent 3px),
        radial-gradient(circle at 20px 30px, rgba(255, 255, 255, 0.25) 0, transparent 3px),
        radial-gradient(circle at 40px 10px, rgba(255, 255, 255, 0.2) 0, transparent 3px),
        radial-gradient(circle at 10px 40px, rgba(255, 255, 255, 0.2) 0, transparent 3px);
      background-size: 80px 80px;
      mix-blend-mode: screen;
    }

    body.show-login {
      /* 使用项目目录下 assets 文件夹中的 Login-bg.png 作为背景，完整显示图片 */
      background: #000 url("assets/Login-bg.png") no-repeat center center;
      background-size: contain;
    }

    .login-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(540px, 92vw);
      height: min(680px, 84vh);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    body.show-login .login-wrapper {
      display: flex;
    }

    .glass-card {
      position: relative;
      width: min(360px, 100%);
      padding: 44px 36px 36px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(28px) saturate(1.2);
      -webkit-backdrop-filter: blur(28px) saturate(1.2);
      transition: transform 0.7s cubic-bezier(0.25, 0.8, 0.25, 1);
      transform: translateY(0);
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(
        circle at top left,
        rgba(255, 255, 255, 0.18),
        transparent 55%
      );
      opacity: 0.35;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .title {
      position: relative;
      font-family: 'HuiwenMincho', "Songti SC", serif;
      font-size: 30px;
      letter-spacing: 0.2em;
      text-align: center;
      margin-bottom: 36px;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.96);
    }

    .form-group {
      position: relative;
      margin-bottom: 22px;
    }

    .label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.08em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(0, 0, 0, 0.25);
      color: #fff;
      outline: none;
      font-size: 14px;
      letter-spacing: 0.05em;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: rgba(255, 255, 255, 0.55);
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
    }

    input[readonly] {
      opacity: 0.85;
    }

    .error {
      font-size: 12px;
      margin-top: 8px;
      color: #ff9999;
      min-height: 16px;
      letter-spacing: 0.03em;
    }

    .btn-submit {
      margin-top: 18px;
      width: 100%;
      padding: 12px 0;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #1a1a1a;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      opacity: 0.95;
    }

    .btn-submit:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    /* ===== 序章（开场剧情 + 手机 UI） ===== */
    .prologue {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      background: #000;
    }

    .prologue.hidden {
      display: none;
    }

    .prologue-frame {
      width: min(980px, 96vw);
      min-height: min(620px, 88vh);
      max-height: min(900px, 96vh);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .prologue-stage {
      position: absolute;
      inset: 0;
      padding: 28px 26px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
    }

    .story-text {
      align-self: center;
      justify-self: center;
      width: min(760px, 88vw);
      text-align: center;
      line-height: 2.0;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.06em;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.12);
      user-select: none;
      white-space: pre-wrap;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      font-family: 'HuiwenMincho', "Songti SC", serif;
    }

    .story-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    .story-hint {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      letter-spacing: 0.12em;
      user-select: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn-continue {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.92);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .btn-continue:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(125, 243, 255, 0.55);
    }

    .btn-continue:active {
      transform: translateY(1px);
    }

    /* 手机 UI */
    .phone-wrap {
      position: absolute;
      inset: 0;
      display: none;
      padding: 8px 12px 22px;
      box-sizing: border-box;
    }

    .phone-wrap.active {
      display: grid;
      place-items: center;
    }

    .phone {
      width: min(440px, 95vw);
      height: min(800px, calc(96vh - 56px));
      max-height: calc(96vh - 48px);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.5));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.85);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 10%, rgba(125, 243, 255, 0.12), transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(255, 139, 246, 0.1), transparent 55%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .phone-topbar {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      letter-spacing: 0.18em;
      user-select: none;
    }

    .topbar-right {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .battery-low {
      color: #ff4b4b;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .phone-screen {
      position: relative;
      z-index: 2;
      flex: 1 1 auto;
      min-height: 0;
      padding: 10px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .phone-main {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }

    #listPanel,
    #chatPanel {
      position: absolute;
      inset: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .phone-screen[data-view="list"] #listPanel {
      display: block;
    }

    .phone-screen[data-view="list"] #chatPanel {
      display: none;
    }

    .phone-screen[data-view="chat"] #listPanel {
      display: none;
    }

    .phone-screen[data-view="chat"] #chatPanel {
      display: flex;
    }

    .phone-screen[data-view="list"] .composer-bar {
      opacity: 0.35;
      pointer-events: none;
    }

    .composer-bar {
      flex: 0 0 auto;
    }

    .phone-header {
      position: relative;
      padding: 12px 10px;
      border-radius: 0;
      border: none;
      background: transparent;
    }

    .phone-title {
      font-size: 14px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.9);
      user-select: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-weight: 700;
    }

    .header-left,
    .header-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.92);
      font-size: 18px;
      user-select: none;
    }

    .header-left { left: 6px; }
    .header-right { right: 6px; }

    .header-back {
      display: inline-block;
      font-size: 20px;
      line-height: 1;
    }

    .header-dots {
      display: inline-block;
      font-size: 15px;
      line-height: 1;
      letter-spacing: -0.22em;
      font-weight: 700;
    }

    .notify-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .notify-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(125, 243, 255, 0.5);
      background: rgba(255, 255, 255, 0.07);
    }

    .notify-btn:active {
      transform: translateY(1px);
    }

    .ghost-icon {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(125, 243, 255, 0.12);
      border: 1px solid rgba(125, 243, 255, 0.35);
      color: rgba(255, 255, 255, 0.92);
      font-weight: 700;
      letter-spacing: 0;
      font-size: 12px;
    }

    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ff5a7a;
      color: #101018;
      font-size: 11px;
      font-weight: 700;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    /* 黑屏里单独出现的“鬼才信”图标 */
    .floating-icon {
      position: absolute;
      left: 50%;
      top: 62%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
    }

    .floating-icon.active {
      display: block;
    }

    .floating-icon.shake .notify-btn {
      animation: shake 1.1s ease-in-out infinite;
    }

    .floating-icon.shake .badge {
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes shake {
      0% { transform: translateY(0) rotate(0deg); }
      18% { transform: translateY(-1px) rotate(-3deg); }
      38% { transform: translateY(0) rotate(3deg); }
      62% { transform: translateY(-1px) rotate(-2deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .panel {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .list {
      padding: 10px 10px 12px;
      display: grid;
      gap: 10px;
    }

    .contact {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .unread-badge {
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ff3b30;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
    }

    .contact:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(125, 243, 255, 0.12);
      border: 1px solid rgba(125, 243, 255, 0.3);
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 800;
      letter-spacing: 0.06em;
      user-select: none;
    }

    .contact-name {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.1em;
    }

    .contact-sub {
      margin-top: 4px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.62);
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ff5a7a;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .chat {
      display: flex;
      height: 100%;
      flex-direction: column;
    }

    .chat-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.35);
    }

    .back {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.86);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    .chat-name {
      font-size: 14px;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.92);
      user-select: none;
    }

    .chat-body {
      flex: 1 1 auto;
      min-height: 0;
      padding: 12px 10px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.36));
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg.them { align-items: flex-start; }
    .msg.me { align-items: flex-end; }

    .bubble {
      max-width: 70%;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 18px;
      border: none;
      background: #ffffff;
      color: #111;
      letter-spacing: 0.04em;
      line-height: 1.65;
      font-size: 13px;
      white-space: pre-wrap;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transform: translateY(10px);
    }

    .bubble.me {
      background: #95EC69;
    }

    .bubble.them {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
    }

    .bubble.aside {
      align-self: center;
      max-width: 100%;
      text-align: left;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.9);
      box-shadow: none;
    }

    .ts {
      font-size: 11px;
      color: #999999;
      user-select: none;
    }

    .bubble.pop {
      animation: popIn 0.22s ease-out forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-actions {
      flex: 0 0 auto;
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.35);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .mini-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.9);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .mini-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .mini-btn:active {
      transform: translateY(1px);
    }

    .composer {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .composer-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      letter-spacing: 0.12em;
      user-select: none;
      padding-left: 2px;
    }

    .composer-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.22);
      color: rgba(255, 255, 255, 0.92);
      outline: none;
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    .composer-input[readonly] {
      opacity: 0.92;
      cursor: default;
    }

    .send-btn {
      appearance: none;
      border: 1px solid rgba(125, 243, 255, 0.35);
      background: rgba(125, 243, 255, 0.12);
      color: rgba(255, 255, 255, 0.92);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    .send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
    }

    .send-btn:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: rgba(125, 243, 255, 0.55);
      background: rgba(125, 243, 255, 0.16);
    }

    .send-btn:not(:disabled):active {
      transform: translateY(1px);
    }

    .mini-btn.arrow-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 20px;
      letter-spacing: 0;
    }

    .narrator {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      padding: 12px 14px 16px;
      display: none;
    }

    .narrator.active {
      display: block;
      animation: slideUp 0.22s ease-out forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .narrator-box {
      width: min(980px, 92vw);
      margin: 0 auto;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.55);
      background: rgba(10, 10, 14, 0.92);

    .lupan-overlay {

      z-index: 20;
      display: none;
      background: #000 url("assets/lupantang.png") center / cover no-repeat;

      display: block;
    }

    .sys-modal-mask {

      inset: 0;
      z-index: 30;

      width: min(380px, 90vw);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.35);

      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;

      border-bottom: 1px solid rgba(255, 255, 255, 0.18);

    .sys-client {
      padding: 14px 14px 12px;
      background: rgba(10, 12, 22, 0.92);
    }

    .sys-q {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 4px;
    }

    .sys-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 14px;
    }

    .sys-btn {
      appearance: none;
      min-width: 72px;
      border-radius: 8px;
      padding: 6px 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    .sys-btn.primary {
      border-color: rgba(125, 243, 255, 0.55);
      background: rgba(125, 243, 255, 0.16);
    }

    .hint-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hint-icon {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.22);
      display: grid;
      place-items: center;
      font-size: 9px;
      font-style: italic;
      cursor: help;
      user-select: none;
      opacity: 0.75;
    }

    .hint-pop {
      position: absolute;
      left: 0;
      top: 110%;
      z-index: 6;
      width: min(320px, 86vw);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.82);
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      line-height: 1.65;
      display: none;
    }

    .hint-wrap:hover .hint-pop {
      display: block;
    }

    .translate-btn {
      appearance: none;
      margin-top: 6px;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.75);
      color: #333;
      cursor: pointer;
    }

    .translate-text {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.65;
      max-width: 70%;
    }

    .msg.them .translate-text {
      align-self: flex-start;
    }

    /* 引导箭头 */
    .guide {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      display: none;
    }

    .guide.active {
      display: block;
    }

    .guide-bubble {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 22px;
      width: min(520px, 92vw);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.5);
      padding: 12px 14px;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.08em;
      line-height: 1.7;
      font-size: 13px;
      font-family: 'HuiwenMincho', "Songti SC", serif;
    }

    .arrow {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 92px;
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 22px solid rgba(125, 243, 255, 0.75);
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.7));
      animation: bob 0.9s ease-in-out infinite alternate;
    }

    @keyframes bob {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(-10px); }
    }

    /* 一屋子鬼（用 CSS 造一个朦胧群像） */
    .ghost-room {
      position: absolute;
      inset: 0;
      display: none;
      background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.08), transparent 55%),
        radial-gradient(circle at 20% 70%, rgba(125, 243, 255, 0.12), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(255, 139, 246, 0.1), transparent 62%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.92));
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .ghost-room.active {
      display: block;
      opacity: 1;
    }

    .ghost-crowd {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      width: min(860px, 96vw);
      height: min(320px, 42vh);
      opacity: 0.9;
      filter: blur(0.2px);
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      padding: 12px 18px;
    }

    .ghost {
      align-self: end;
      width: 100%;
      height: 100%;
      max-height: 240px;
      border-radius: 999px 999px 18px 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .ghost::before {
      content: "";
      position: absolute;
      inset: -20% -10% 0 -10%;
      background: radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.12), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .ghost:nth-child(3n) { background: rgba(125, 243, 255, 0.06); }
    .ghost:nth-child(4n) { background: rgba(255, 139, 246, 0.05); }
    .ghost:nth-child(2n) { transform: translateY(12px); }
    .ghost:nth-child(5n) { transform: translateY(-6px); opacity: 0.75; }

    .overlay-text {
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      width: min(820px, 92vw);
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.45);
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.08em;
      line-height: 1.85;
      font-size: 14px;
      white-space: pre-wrap;
      text-shadow: 0 0 18px rgba(0, 0, 0, 0.6);
      user-select: none;
      font-family: 'HuiwenMincho', "Songti SC", serif;
    }

    /* ===== CUSTOM SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #000;
    }
    ::-webkit-scrollbar-thumb {
      background: #7fffd4;
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #7fffd4;
    }
    ::-webkit-scrollbar-button {
      background: #7fffd4;
    }
    ::-webkit-scrollbar-corner {
      background: #000;
    }
  </style>
</head>

      phoneScreen.dataset.mode = "list";
      headerLeft.removeAttribute("aria-label");
      headerLeft.textContent = "★";
      headerRight.textContent = "＋";
      phoneHeaderTitle.textContent = "鬼才信";
    }

    function setChatHeader(title) {
      uiMode = "chat";
      phoneScreen.dataset.mode = "chat";
      headerLeft.setAttribute("aria-label", "返回");
      headerLeft.innerHTML = '<span class="header-back" aria-hidden="true">↩</span>';
      headerRight.innerHTML = '<span class="header-dots" aria-hidden="true">···</span>';
      phoneHeaderTitle.textContent = title;
    }

    function markThreadRead(threadKey) {
      const st = chatState[threadKey];
      st.lastSeenMsgCount = st.messages.length;
      st.unread = 0;
      refreshUnreadUI(threadKey);
    }

    function bumpUnread(threadKey) {
      if (activeChatKey() === threadKey) return;
      chatState[threadKey].unread += 1;
      refreshUnreadUI(threadKey);
    }

    function activeChatKey() {
      if (phoneScreen.dataset.view === "chat") return currentChatKey;
      return null;
    }

    function refreshUnreadUI(threadKey) {
      if (threadKey === "niu") {
        niuUnread.style.display = chatState.niu.unread > 0 ? "grid" : "none";
        niuUnread.textContent = String(Math.min(99, chatState.niu.unread));
      }
      if (threadKey === "ma") {
        let badge = maUnreadSlot.querySelector(".unread-badge");
        if (chatState.ma.unread > 0) {
          if (!badge) {
            badge = document.createElement("div");
            badge.className = "unread-badge";
            maUnreadSlot.replaceChildren(badge);
          }
          badge.textContent = String(Math.min(99, chatState.ma.unread));
        } else {
          maUnreadSlot.replaceChildren();
          const spacer = document.createElement("div");
          spacer.style.width = "10px";
          spacer.style.height = "10px";
          maUnreadSlot.appendChild(spacer);
        }
      }
    }

    function updateContactPreview(threadKey) {
      const node = threadKey === "niu" ? cNiu : cMa;
      const sub = node.querySelector(".contact-sub");
      const last = chatState[threadKey].messages.at(-1);
      const plain = last
        ? (last.html ? last.text.replace(/<[^>]+>/g, "") : last.text).replace(/\n/g, " ")
        : "";
      if (sub) sub.textContent = plain ? plain.slice(0, 28) : "（暂无新消息）";
    }

    function showList() {
      currentChatKey = null;
      phoneScreen.dataset.view = "list";
      setListHeader();
      resetNetClock();
      updateContactPreview("niu");
      updateContactPreview("ma");
      refreshUnreadUI("niu");
      refreshUnreadUI("ma");
    }

    function showPhoneUI() {
      storyStage.style.display = "none";
      phoneStage.classList.add("active");
      guide.classList.remove("active");
      showList();
    }

    function openChat(which) {
      if (forceSysModalUntilYes) {
        openSysModal();
        return;
      }
      currentChatKey = which;
      phoneScreen.dataset.view = "chat";
      setChatHeader(chatState[which].displayName);
      markThreadRead(which);
      renderChat(which);
    }

    function addMessage(threadKey, side, text, tsText, extra) {
      chatState[threadKey].messages.push({ side, text, tsText, ...(extra || {}) });
      updateContactPreview(threadKey);
      if (activeChatKey() !== threadKey) bumpUnread(threadKey);
    }

    function renderChat(threadKey) {
      chatBody.innerHTML = "";
      const msgs = chatState[threadKey].messages;
      for (const m of msgs) {
        const wrap = document.createElement("div");
        wrap.className = `msg ${m.side}`;
        const bubble = document.createElement("div");
        bubble.className = `bubble ${m.side} pop`;
        if (m.html) bubble.innerHTML = m.text;
        else bubble.textContent = m.text;

        if (m.translation) {
          const trBtn = document.createElement("button");
          trBtn.type = "button";
          trBtn.className = "translate-btn";
          trBtn.textContent = "翻译";
          const trText = document.createElement("div");
          trText.className = "translate-text";
          trText.style.display = "none";
          trText.textContent = m.translation;
          trBtn.addEventListener("click", () => {
            trText.style.display = trText.style.display === "none" ? "block" : "none";
          });
          wrap.appendChild(bubble);
          wrap.appendChild(trBtn);
          wrap.appendChild(trText);
        } else {
          wrap.appendChild(bubble);
        }

        const ts = document.createElement("div");
        ts.className = "ts";
        ts.textContent = m.tsText || "";
        wrap.appendChild(ts);
        chatBody.appendChild(wrap);
      }
      chatBody.scrollTop = chatBody.scrollHeight;
      resetComposer();
      const script = chatScripts[threadKey];
      const st = chatState[threadKey];
      const step = script.steps[st.ptr];
      if (step && step.from === "me") {
        awaitingDraft = step.draft || "";
      }
    }

    function resetComposer() {
      composerInput.value = "";
      btnSend.disabled = true;
      awaitingDraft = null;
    }

    function clearRoleTimer() {
      if (roleTimer) {
        clearTimeout(roleTimer);
        roleTimer = null;
      }
    }

    function tickThread(threadKey, opts) {
      clearRoleTimer();
      const script = chatScripts[threadKey];
      const st = chatState[threadKey];
      if (!script) return;

      const afterSend = !!(opts && opts.afterSend);

      if (threadKey === "ma" && !allowMaDraft) return;

      const step = script.steps[st.ptr];
      if (!step) return;

      if (step.from === "them") {
        const delay = ROLE_MSG_GAP_MS;
        roleTimer = setTimeout(() => {
          if (step.speaker) {
            st.displayName = step.speaker;
            if (uiMode === "chat" && currentChatKey === threadKey) {
              setChatHeader(step.speaker);
            }
            if (threadKey === "ma") {
              const maNameEl = cMa.querySelector(".contact-name");
              if (maNameEl) maNameEl.textContent = step.speaker;
            }
          }
          addMessage(threadKey, "them", step.text, currentTs(), {
            html: !!step.html,
            translation: step.translation || "",
          });
          st.ptr += 1;
          renderChat(threadKey);
          markThreadRead(threadKey);
          tickThread(threadKey, { afterSend: true });
        }, delay);
        return;
      }

      if (step.from === "system") {
        if (step.action === "niuDone") {
          allowMaDraft = true;
          st.ptr += 1;
          tickThread(threadKey, { afterSend: false });
          return;
        }
        if (step.action === "revealLord") {
          maIdentityRevealed = true;
          chatState.ma.displayName = "城主 旻狱";
          const maNameEl = cMa.querySelector(".contact-name");
          if (maNameEl) maNameEl.textContent = "城主 旻狱";
          st.ptr += 1;
          tickThread(threadKey, { afterSend: false });
          return;
        }
        if (step.action === "narratorGhost") {
          roleTimer = setTimeout(() => {
            roleTimer = null;
            showNarrator("？？？我去，闹鬼了。", () => {
              st.ptr += 1;
              tickThread(threadKey, { afterSend: true });
            });
          }, ROLE_MSG_GAP_MS);
          return;
        }
        if (step.action === "selfMonologueThenLupan") {
          roleTimer = setTimeout(() => {
            roleTimer = null;
            showNarrator("戮判堂？我不就在戮判堂嘛，我还坐在你的宝座上玩手机呢。", () => {
              phoneStage.classList.remove("active");
              lupanOverlay.classList.add("active");
              st.ptr += 1;
            });
          }, ROLE_MSG_GAP_MS);
          return;
        }
        if (step.action === "promptSurvey") {
          roleTimer = setTimeout(() => openSysModal(), ROLE_MSG_GAP_MS);
          return;
        }
        st.ptr += 1;
        tickThread(threadKey, { afterSend: false });
        return;
      }

      if (step.from === "me") {
        if (step.auto) {
          roleTimer = setTimeout(() => {
            addMessage(threadKey, "me", step.draft, currentTs());
            st.ptr += 1;
            renderChat(threadKey);
            markThreadRead(threadKey);
            tickThread(threadKey, { afterSend: true });
          }, ROLE_MSG_GAP_MS);
          return;
        }
        awaitingDraft = step.draft || "";
        return;
      }
    }

    function openSysModal() {
      sysModalMask.classList.add("active");
    }

    function closeSysModal() {
      sysModalMask.classList.remove("active");
    }

    function installForceModalTrap() {
      if (forceModalTrapInstalled) return;
      forceModalTrapInstalled = true;
      trapHandler = () => {
        if (!forceSysModalUntilYes) return;
        if (sysModalMask.classList.contains("active")) return;
        openSysModal();
      };
      document.addEventListener("click", trapHandler, true);
      document.addEventListener("keydown", trapHandler, true);
      document.addEventListener("touchstart", trapHandler, true);
    }

    function showNarrator(text, onClose) {
      pendingNarratorResume = typeof onClose === "function" ? onClose : null;
      narratorBoxEl.textContent = text;
      narratorEl.classList.add("active");
    }

    narratorBoxEl.addEventListener("click", () => {
      narratorEl.classList.remove("active");
      const fn = pendingNarratorResume;
      pendingNarratorResume = null;
      if (fn) setTimeout(fn, ROLE_MSG_GAP_MS);
    });

    lupanOverlay.addEventListener("click", () => {
      lupanOverlay.classList.remove("active");
      phoneStage.classList.add("active");
      if (currentChatKey === "ma") {
        setChatHeader(chatState.ma.displayName);
        tickThread("ma", { afterSend: true });
      }
    });

    let trapHandler = null;

    function removeForceModalTrap() {
      if (!trapHandler) return;
      document.removeEventListener("click", trapHandler, true);
      document.removeEventListener("keydown", trapHandler, true);
      document.removeEventListener("touchstart", trapHandler, true);
      trapHandler = null;
      forceModalTrapInstalled = false;
    }

    btnSysYes.addEventListener("click", (e) => {
      e.stopPropagation();
      forceSysModalUntilYes = false;
      surveyDeclinedFieldworkNoteSent = false;
      closeSysModal();
      removeForceModalTrap();
      const st = chatState.ma;
      const script = chatScripts.ma;
      if (script.steps[st.ptr] && script.steps[st.ptr].action === "promptSurvey") {
        st.ptr += 1;
      }
      finishPrologue();
    });

    btnSysNo.addEventListener("click", (e) => {
      e.stopPropagation();
      closeSysModal();
      forceSysModalUntilYes = true;
      installForceModalTrap();
      if (!surveyDeclinedFieldworkNoteSent) {
        surveyDeclinedFieldworkNoteSent = true;
        addMessage("ma", "them", "我与老牛已出外勤，认真工作中，勿诽谤", currentTs());
        updateContactPreview("ma");
        refreshUnreadUI("ma");
      }
    });

    function finishPrologue() {
      prologueEl.classList.add("hidden");
      document.body.classList.add("show-login");
      document.title = "戮判城工作系统 - 登录";
    }

    function hideStoryThen(cb) {
      setStoryVisible(false);
      setTimeout(cb, 520);
    }

    function showStoryLine(idx) {
      storyLineIdx = idx;
      setStoryText(storyLines[idx]);
      requestAnimationFrame(() => setStoryVisible(true));
    }

    function setStoryVisible(visible) {
      storyText.classList.toggle("show", visible);
    }

    function setStoryText(text) {
      storyText.textContent = text;
    }

    function advanceStoryLine() {
      if (storyPhase !== "line") return;
      if (storyLineIdx < storyLines.length - 1) {
        hideStoryThen(() => {
          showStoryLine(storyLineIdx + 1);
        });
        return;
      }
      hideStoryThen(() => {
        storyPhase = "icon";
        floatingIcon.classList.add("active", "shake");
      });
    }

    storyStage.addEventListener("click", (e) => {
      if (floatingIcon.contains(e.target)) return;
      if (storyPhase === "line") advanceStoryLine();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        if (!prologueEl.classList.contains("hidden") && storyStage.style.display !== "none" && storyPhase === "line") {
          advanceStoryLine();
        }
      }
    });

    floatingNotifyBtn.addEventListener("click", () => {
      if (forceSysModalUntilYes) {
        openSysModal();
        return;
      }
      if (storyPhase !== "icon") return;
      floatingBadge.style.display = "none";
      floatingIcon.classList.remove("active", "shake");
      storyPhase = "phone";
      showPhoneUI();
    });

    headerLeft.addEventListener("click", () => {
      if (forceSysModalUntilYes) {
        openSysModal();
        return;
      }
      if (uiMode === "chat") showList();
    });

    cNiu.addEventListener("click", () => openChat("niu"));
    cMa.addEventListener("click", () => openChat("ma"));

    btnSend.addEventListener("click", () => {
      if (forceSysModalUntilYes) {
        openSysModal();
        return;
      }
      const threadKey = currentChatKey;
      if (!threadKey) return;
      const script = chatScripts[threadKey];
      const st = chatState[threadKey];
      const step = script.steps[st.ptr];
      if (!step || step.from !== "me") return;
      if (threadKey === "ma" && !allowMaDraft) return;

      addMessage(threadKey, "me", composerInput.value, currentTs());
      st.ptr += 1;
      renderChat(threadKey);
      markThreadRead(threadKey);
      tickThread(threadKey, { afterSend: true });
    });

    composerInput.addEventListener("click", () => {
      if (forceSysModalUntilYes) {
        openSysModal();
        return;
      }
      const threadKey = currentChatKey;
      if (!threadKey) return;
      const script = chatScripts[threadKey];
      const st = chatState[threadKey];
      const step = script.steps[st.ptr];
      if (!step || step.from !== "me") return;
      if (threadKey === "ma" && !allowMaDraft) return;
      if (!awaitingDraft) return;
      composerInput.value = awaitingDraft;
      btnSend.disabled = false;
    });

    // 初始化：牛大人第一条未读（玩家点进聊天即视为已读）
    function seedInitialUnread() {
      chatState.niu.messages = [{ side: "them", text: "王助理，下五子棋吗？", tsText: "00:00", html: false }];
      chatState.niu.ptr = 1; // 下一条从玩家回复开始
      chatState.niu.unread = 1;
      refreshUnreadUI("niu");
      updateContactPreview("niu");
    }

    seedInitialUnread();
    storyPhase = "line";
    showStoryLine(0);
    batteryEl.textContent = "10%";

    const form = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error");
    const identityRole = document.getElementById("identityRole");
    passwordInput.addEventListener("input", () => {
      const len = passwordInput.value.length;
      if (len >= 8) identityRole.value = "实习生";
      else identityRole.value = "";
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const pwd = passwordInput.value.trim();

      if (!pwd) {
        errorEl.textContent = "请输入密码。";
        return;
      }

      if (pwd === "91031010") {
        errorEl.textContent = "";
        window.location.href = "dangan.html";
      } else {
        errorEl.textContent = "密码错误，请重试。";
      }
    });

    // 登录卡热区交互：离开热区上移，回到热区复位
    const loginWrapper = document.querySelector(".login-wrapper");
    const glassCard = document.querySelector(".glass-card");

    if (loginWrapper && glassCard) {
      loginWrapper.addEventListener("mouseenter", () => {
        glassCard.style.transform = "translateY(0)";
      });
      loginWrapper.addEventListener("mouseleave", () => {
        glassCard.style.transform = "translateY(-70vh)";
      });
    }
  </script>
</body>
</html>
